services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vibeful
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vibeful_prod}
      POSTGRES_DB: vibeful
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeful"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Agent Engine ────────────────────────────────────────────
  agent-engine:
    build:
      context: .
      dockerfile: packages/agent-engine/Dockerfile
    ports:
      - "127.0.0.1:50051:50051"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DATABASE_URL: postgresql://vibeful:${DB_PASSWORD:-vibeful_prod}@postgres:5432/vibeful
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "50051"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Proxy ───────────────────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: packages/proxy/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      AGENT_ENGINE_URL: agent-engine:50051
      DATABASE_URL: postgresql://vibeful:${DB_PASSWORD:-vibeful_prod}@postgres:5432/vibeful
      VIBEFUL_API_KEYS: ${VIBEFUL_API_KEYS:-changeme}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      agent-engine:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── API Gateway ─────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: packages/api-gateway/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PROXY_URL: http://proxy:8000
    restart: unless-stopped
    depends_on:
      - proxy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
