[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vibeful"
version = "0.1.0"
description = "Python SDK for the Vibeful agent platform — headless agent invocation, streaming, and management."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
]
license = {text = "MIT"}
readme = "README.md"
authors = [
    {name = "Vibeful Contributors"},
]
keywords = ["ai", "agent", "llm", "vibeful"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[tool.setuptools.packages.find]
where = ["src"]