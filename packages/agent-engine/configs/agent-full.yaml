# Full agent graph — all nodes with guard, RAG, MCP, citations, follow-ups.
# Equivalent to the default build_agent_graph().

graph:
  entry: attack_guard
  nodes:
    - name: attack_guard
      type: builtin.attack_guard
    - name: setup
      type: builtin.setup
    - name: fact_recall
      type: builtin.fact_recall
    - name: planning
      type: builtin.planning
    - name: buttons
      type: builtin.buttons
    - name: system_prompt
      type: builtin.system_message_builder
    - name: rag
      type: builtin.rag
    - name: mcp_discovery
      type: builtin.mcp_discovery
    - name: react
      type: builtin.react_agent
      config:
        max_iterations: 5
    - name: completion
      type: builtin.stream_completion
    - name: citation
      type: builtin.citation
    - name: follow_up
      type: builtin.follow_up
    - name: fact_mining
      type: builtin.fact_mining
  edges:
    - from: attack_guard
      routes:
        safe: setup
        end: __END__
    - from: setup
      to: fact_recall
    - from: fact_recall
      to: planning
    - from: planning
      to: buttons
    - from: buttons
      to: system_prompt
    - from: system_prompt
      condition: builtin.router
      routes:
        rag: rag
        react_agent: react
        mcp_discovery: mcp_discovery
    - from: rag
      to: mcp_discovery
    - from: mcp_discovery
      to: react
    - from: react
      to: completion
    - from: completion
      to: citation
    - from: citation
      to: follow_up
    - from: follow_up
      to: fact_mining
    - from: fact_mining
      to: __END__
