# Minimal agent graph — just the core loop.
# Use this when you want a simple chatbot without RAG, guard, or memory.

graph:
  entry: setup
  nodes:
    - name: setup
      type: builtin.setup
    - name: system_prompt
      type: builtin.system_message_builder
    - name: react
      type: builtin.react_agent
      config:
        max_iterations: 5
    - name: completion
      type: builtin.stream_completion
  edges:
    - from: setup
      to: system_prompt
    - from: system_prompt
      to: react
    - from: react
      to: completion
    - from: completion
      to: __END__
