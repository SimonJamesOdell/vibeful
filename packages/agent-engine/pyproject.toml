[project]
name = "vibeful-agent-engine"
version = "0.1.0"
description = "Vibeful AI agent engine — LangGraph-based conversational agent with gRPC streaming"
requires-python = ">=3.12"

dependencies = [
    "grpcio>=1.67.0",
    "grpcio-tools>=1.67.0",
    "protobuf>=5.0.0",
    "langgraph>=0.3.0",
    "langchain-core>=0.3.0",
    "langchain-deepseek>=0.1.0",
    "openai>=1.50.0",       # DeepSeek uses OpenAI-compatible API
    "psycopg[binary]>=3.2.0",
    "redis>=5.2.0",
    "pydantic>=2.9.0",
    "python-dotenv>=1.0.0",
    "aiosqlite>=0.20.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "grpcio-testing>=1.67.0",
]

[project.scripts]
vibeful = "src.cli:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
