[project]
name = "vibeful-proxy"
version = "0.1.0"
description = "Vibeful proxy — stateless credential-injecting gateway (FastAPI)"
requires-python = ">=3.12"

dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "httpx>=0.28.0",
    "grpcio>=1.67.0",
    "grpcio-tools>=1.67.0",
    "protobuf>=5.0.0",
    "psycopg[binary]>=3.2.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.28.0",
]
